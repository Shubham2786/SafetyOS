apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: safetyos-ingress
  namespace: safetyos
  labels:
    app.kubernetes.io/name: safetyos-ingress
    app.kubernetes.io/part-of: safetyos-platform
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  rules:
    - host: safetyos.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dashboard-web-service
                port:
                  number: 3000
    - host: admin.safetyos.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin-portal-service
                port:
                  number: 3001
    - host: copilot.safetyos.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ai-copilot-service
                port:
                  number: 3002
    - host: api.safetyos.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bff-service
                port:
                  number: 8080
    - host: ai.safetyos.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ai-service
                port:
                  number: 8000
