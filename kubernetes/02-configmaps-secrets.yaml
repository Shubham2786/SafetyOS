apiVersion: v1
kind: ConfigMap
metadata:
  name: safetyos-config
  namespace: safetyos
  labels:
    app.kubernetes.io/name: safetyos-config
    app.kubernetes.io/part-of: safetyos-platform
data:
  NODE_ENV: "production"
  PORT_BFF: "8080"
  PORT_AI: "8000"
  BFF_SERVICE_URL: "http://bff-service.safetyos.svc.cluster.local:8080"
  AI_SERVICE_URL: "http://ai-service.safetyos.svc.cluster.local:8000"
  POSTGRES_HOST: "postgres.safetyos.svc.cluster.local"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "safetyos"
  REDIS_HOST: "redis.safetyos.svc.cluster.local"
  REDIS_PORT: "6379"
  NEO4J_URI: "bolt://neo4j.safetyos.svc.cluster.local:7687"
  QDRANT_URL: "http://qdrant.safetyos.svc.cluster.local:6333"
  KAFKA_BROKERS: "kafka.safetyos.svc.cluster.local:9092"
---
apiVersion: v1
kind: Secret
metadata:
  name: safetyos-secrets
  namespace: safetyos
  labels:
    app.kubernetes.io/name: safetyos-secrets
    app.kubernetes.io/part-of: safetyos-platform
type: Opaque
stringData:
  POSTGRES_USER: "safetyos"
  POSTGRES_PASSWORD: "safetyos_production_password_change_me"
  NEO4J_AUTH: "neo4j/safetyos_production_password_change_me"
  JWT_SECRET: "super_secret_jwt_signing_key_halo_zero_trust_2026"
  OPA_TOKEN: "opa_bearer_token_safetyos_secure"
