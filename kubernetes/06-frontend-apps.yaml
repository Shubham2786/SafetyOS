# ==========================================
# Dashboard Web Console (Next.js 15, Port 3000)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-web
  namespace: safetyos
  labels:
    app: dashboard-web
    app.kubernetes.io/part-of: safetyos-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dashboard-web
  template:
    metadata:
      labels:
        app: dashboard-web
    spec:
      containers:
        - name: dashboard-web
          image: safetyos/dashboard-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: safetyos-config
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-web-service
  namespace: safetyos
  labels:
    app: dashboard-web
spec:
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  selector:
    app: dashboard-web
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dashboard-web-hpa
  namespace: safetyos
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dashboard-web
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
---
