name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
      neo4j:
        image: neo4j:5
        env:
          NEO4J_AUTH: neo4j/secret
        ports:
          - 7687:7687
      kafka:
        image: bitnami/kafka:latest
        env:
          KAFKA_CFG_ZOOKEEPER_CONNECT: zookeeper:2181
          KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_CFG_LISTENERS: PLAINTEXT://0.0.0.0:9092
        ports:
          - 9092:9092
      zookeeper:
        image: bitnami/zookeeper:latest
        env:
          ALLOW_ANONYMOUS_LOGIN: "yes"
        ports:
          - 2181:2181
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          cd services/ai
          pip install -r requirements.txt

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build Go BFF service
        run: |
          cd services/bff
          go build ./cmd/server

      - name: Run unit tests (Python)
        run: |
          cd services/ai
          pytest -q

      - name: Run lint (Python)
        run: |
          cd services/ai
          pip install flake8
          flake8 .

      - name: Run lint (Go)
        run: |
          cd services/bff
          go vet ./...

      - name: Build Docker images
        run: |
          docker compose -f docker-compose.yml build

      - name: Smoke test AI service
        run: |
          docker run -d --name ai_test -p 8000:8000 services_ai:latest
          sleep 5
          curl -s http://localhost:8000/healthz

      - name: Stop containers
        if: always()
        run: |
          docker rm -f ai_test || true
